openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Data Center Asset Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: sites
    description: Data center site management
  - name: rooms
    description: Room management within sites
  - name: racks
    description: Rack management within rooms
  - name: assets
    description: Asset management within racks
  - name: incidents
    description: Incident tracking
  - name: users
    description: User management (ADMIN only)
  - name: dashboard
    description: Dashboard summary endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /sites:
    get:
      operationId: listSites
      tags: [sites]
      summary: List all sites
      responses:
        "200":
          description: List of sites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Site"
    post:
      operationId: createSite
      tags: [sites]
      summary: Create a new site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteInput"
      responses:
        "201":
          description: Created site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"

  /sites/{id}:
    get:
      operationId: getSite
      tags: [sites]
      summary: Get a site by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
    put:
      operationId: updateSite
      tags: [sites]
      summary: Update a site
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteInput"
      responses:
        "200":
          description: Updated site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
    delete:
      operationId: deleteSite
      tags: [sites]
      summary: Delete a site
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List rooms, optionally filtered by site
      parameters:
        - name: siteId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a new room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Created room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get a room by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    put:
      operationId: updateRoom
      tags: [rooms]
      summary: Update a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /racks:
    get:
      operationId: listRacks
      tags: [racks]
      summary: List racks, optionally filtered by room
      parameters:
        - name: roomId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of racks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rack"
    post:
      operationId: createRack
      tags: [racks]
      summary: Create a new rack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RackInput"
      responses:
        "201":
          description: Created rack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rack"

  /racks/{id}:
    get:
      operationId: getRack
      tags: [racks]
      summary: Get a rack by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rack"
    put:
      operationId: updateRack
      tags: [racks]
      summary: Update a rack
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RackInput"
      responses:
        "200":
          description: Updated rack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rack"
    delete:
      operationId: deleteRack
      tags: [racks]
      summary: Delete a rack
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /racks/{id}/slots:
    get:
      operationId: getRackSlots
      tags: [racks]
      summary: Get rack slot layout
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rack slot layout
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RackSlot"

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List assets
      parameters:
        - name: rackId
          in: query
          required: false
          schema:
            type: integer
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create a new asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get an asset by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List incidents
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [OPEN, IN_PROGRESS, RESOLVED]
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
    post:
      operationId: createIncident
      tags: [incidents]
      summary: Create a new incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentInput"
      responses:
        "201":
          description: Created incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{id}:
    get:
      operationId: getIncident
      tags: [incidents]
      summary: Get an incident by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
    put:
      operationId: updateIncident
      tags: [incidents]
      summary: Update an incident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncidentInput"
      responses:
        "200":
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
    delete:
      operationId: deleteIncident
      tags: [incidents]
      summary: Delete an incident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (ADMIN only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (ADMIN only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID (ADMIN only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user (ADMIN only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (ADMIN only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /warranty/expiring:
    get:
      operationId: getExpiringWarranties
      tags: [assets]
      summary: Get assets with warranties expiring within 90 days
      responses:
        "200":
          description: List of assets with expiring warranties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    CurrentUser:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [ADMIN, ENGINEER, VIEWER]

    Site:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        roomCount:
          type: integer

    SiteInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        city:
          type: string
        country:
          type: string

    Room:
      type: object
      required: [id, name, siteId]
      properties:
        id:
          type: integer
        name:
          type: string
        floor:
          type: ["string", "null"]
        siteId:
          type: integer
        siteName:
          type: ["string", "null"]
        rackCount:
          type: integer

    RoomInput:
      type: object
      required: [name, siteId]
      properties:
        name:
          type: string
          minLength: 1
        floor:
          type: string
        siteId:
          type: integer

    Rack:
      type: object
      required: [id, name, roomId, totalU]
      properties:
        id:
          type: integer
        name:
          type: string
        roomId:
          type: integer
        roomName:
          type: ["string", "null"]
        siteName:
          type: ["string", "null"]
        totalU:
          type: integer
        usedU:
          type: integer
        description:
          type: ["string", "null"]

    RackInput:
      type: object
      required: [name, roomId, totalU]
      properties:
        name:
          type: string
          minLength: 1
        roomId:
          type: integer
        totalU:
          type: integer
        description:
          type: string

    RackSlot:
      type: object
      required: [u, isEmpty]
      properties:
        u:
          type: integer
        isEmpty:
          type: boolean
        assetId:
          type: ["integer", "null"]
        assetName:
          type: ["string", "null"]
        assetType:
          type: ["string", "null"]
        uStart:
          type: ["integer", "null"]
        uHeight:
          type: ["integer", "null"]
        isTop:
          type: boolean
        status:
          type: ["string", "null"]

    Asset:
      type: object
      required: [id, name, type, rackId, uPosition, uHeight]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [SERVER, SWITCH, PDU, UPS, STORAGE, OTHER]
        manufacturer:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        serialNumber:
          type: ["string", "null"]
        assetTag:
          type: ["string", "null"]
        rackId:
          type: integer
        rackName:
          type: ["string", "null"]
        uPosition:
          type: integer
        uHeight:
          type: integer
        status:
          type: string
          enum: [ACTIVE, INACTIVE, MAINTENANCE]
        installDate:
          type: ["string", "null"]
        warrantyExpiration:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]

    AssetInput:
      type: object
      required: [name, type, rackId, uPosition, uHeight]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [SERVER, SWITCH, PDU, UPS, STORAGE, OTHER]
        manufacturer:
          type: string
        model:
          type: string
        serialNumber:
          type: string
        assetTag:
          type: string
        rackId:
          type: integer
        uPosition:
          type: integer
        uHeight:
          type: integer
        status:
          type: string
          enum: [ACTIVE, INACTIVE, MAINTENANCE]
          default: ACTIVE
        installDate:
          type: string
        warrantyExpiration:
          type: string

    Incident:
      type: object
      required: [id, title, severity, status]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        status:
          type: string
          enum: [OPEN, IN_PROGRESS, RESOLVED]
        assetId:
          type: ["integer", "null"]
        assetName:
          type: ["string", "null"]
        assignedTo:
          type: ["string", "null"]
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]
        resolvedAt:
          type: ["string", "null"]

    IncidentInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
          default: MEDIUM
        status:
          type: string
          enum: [OPEN, IN_PROGRESS, RESOLVED]
          default: OPEN
        assetId:
          type: integer
        assignedTo:
          type: string

    User:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [ADMIN, ENGINEER, VIEWER]

    UserInput:
      type: object
      required: [username, role]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
        role:
          type: string
          enum: [ADMIN, ENGINEER, VIEWER]

    RackUtilization:
      type: object
      required: [rackId, rackName, totalU, usedU, utilizationPct]
      properties:
        rackId:
          type: integer
        rackName:
          type: string
        roomName:
          type: ["string", "null"]
        siteName:
          type: ["string", "null"]
        totalU:
          type: integer
        usedU:
          type: integer
        utilizationPct:
          type: number

    DashboardSummary:
      type: object
      required: [totalAssets, totalRacks, totalSites, rackUtilization]
      properties:
        totalAssets:
          type: integer
        totalRacks:
          type: integer
        totalSites:
          type: integer
        totalRooms:
          type: integer
        activeAssets:
          type: integer
        assetsInMaintenance:
          type: integer
        expiringWarrantiesCount:
          type: integer
        rackUtilization:
          type: array
          items:
            $ref: "#/components/schemas/RackUtilization"
        assetsByType:
          type: array
          items:
            $ref: "#/components/schemas/AssetTypeCount"

    AssetTypeCount:
      type: object
      required: [type, count]
      properties:
        type:
          type: string
        count:
          type: integer
