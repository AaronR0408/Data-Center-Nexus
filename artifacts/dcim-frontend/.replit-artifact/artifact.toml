kind = "web"
previewPath = "/"
title = "DCIM Dashboard"
version = "1.0.0"
id = "artifacts/dcim-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25437

[services.development]
run = "pnpm --filter @workspace/dcim-frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dcim-frontend", "run", "build" ]
publicDir = "artifacts/dcim-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25437"
BASE_PATH = "/"
